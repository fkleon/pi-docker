services:
  pi-coding-agent:
    image: pi-coding-agent:${VERSION}
    build:
      dockerfile: Dockerfile
      context: .
      args:
        VERSION: ${VERSION}
        CHECKSUM: ${CHECKSUM}
    environment:
      PI_SKIP_VERSION_CHECK: 1
    volumes:
      - type: volume
        source: pi-data
        target: /home/user/.pi
    tty: true

volumes:
  pi-data:
